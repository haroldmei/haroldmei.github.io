<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily ML Job Matches — Haiyuan Mei | FAANG AI &amp; MLOps Roles</title>
  <meta name="description" content="AI-scored daily job matches for ML Engineer, Applied Scientist and MLOps roles at FAANG companies. Filtered and ranked by relevance to Haiyuan Mei's resume." />
  <meta name="keywords" content="ML Engineer jobs, MLOps jobs, Applied Scientist jobs, FAANG jobs, AI jobs, Amazon ML jobs, Stripe ML jobs, machine learning careers" />
  <meta name="author" content="Haiyuan Mei" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://haroldmei.github.io/job-scraper/" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://haroldmei.github.io/job-scraper/" />
  <meta property="og:title" content="Daily ML Job Matches — Haiyuan Mei | FAANG AI &amp; MLOps Roles" />
  <meta property="og:description" content="AI-scored daily job matches for ML Engineer, Applied Scientist and MLOps roles at FAANG companies, ranked by resume relevance." />
  <meta property="og:site_name" content="Haiyuan Mei" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Daily ML Job Matches — Haiyuan Mei" />
  <meta name="twitter:description" content="AI-scored daily FAANG job matches for ML Engineer and Applied Scientist roles, ranked by resume relevance." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    nav { display: flex; gap: 1rem; margin-bottom: 2rem; align-items: center; }
    nav a { color: #6366f1; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { text-decoration: underline; }
    .sep { color: #334155; }
    .header { margin-bottom: 2rem; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
    .meta { color: #64748b; font-size: 0.9rem; }
    .meta span { color: #6366f1; font-weight: 600; }
    .controls {
      display: flex; gap: 1rem; flex-wrap: wrap;
      margin-bottom: 1.5rem; align-items: center;
    }
    input, select {
      background: #1e293b; border: 1px solid #334155;
      color: #e2e8f0; padding: 0.5rem 0.75rem;
      border-radius: 8px; font-size: 0.875rem; outline: none;
    }
    input { width: 260px; }
    input:focus, select:focus { border-color: #6366f1; }
    .count { color: #64748b; font-size: 0.875rem; margin-left: auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }
    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 1.1rem 1.25rem;
      display: flex; flex-direction: column; gap: 0.5rem;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #6366f1; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
    .title {
      font-size: 0.9rem; font-weight: 600; line-height: 1.4;
      color: #e2e8f0; text-decoration: none;
    }
    .title:hover { color: #818cf8; }
    .score-badge {
      font-size: 0.75rem; font-weight: 700;
      padding: 0.2rem 0.5rem; border-radius: 6px;
      white-space: nowrap; flex-shrink: 0;
      background: #0f172a;
    }
    .card-meta { font-size: 0.78rem; color: #64748b; }
    .card-meta strong { color: #94a3b8; }
    .overlap { font-size: 0.75rem; color: #475569; }
    .empty {
      grid-column: 1/-1; text-align: center;
      color: #475569; padding: 3rem; font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <span class="sep">/</span>
    <a href="/job-scraper">Job Scraper</a>
  </nav>
  <div class="header">
    <h1>Job Matches</h1>
    <p class="meta">Run: <span>2026-03-31</span> &nbsp;·&nbsp; <span id="shown">0</span> of <span>0</span> jobs shown</p>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="Search title or location..." oninput="filter()" />
    <select id="company" onchange="filter()">
      <option value="">All companies</option>

    </select>
    <select id="sort" onchange="filter()">
      <option value="score">Sort: Score ↓</option>
      <option value="overlap">Sort: Keyword overlap ↓</option>
      <option value="title">Sort: Title A–Z</option>
    </select>
    <span class="count" id="count"></span>
  </div>
  <div class="grid" id="grid"></div>

  <script>
    const JOBS = [];

    function scoreColor(s) {
      if (s >= 95) return '#22c55e';
      if (s >= 85) return '#84cc16';
      if (s >= 75) return '#eab308';
      if (s >= 65) return '#f97316';
      return '#ef4444';
    }

    function render(jobs) {
      const grid = document.getElementById('grid');
      if (!jobs.length) {
        grid.innerHTML = '<div class="empty">No jobs match your filters.</div>';
        document.getElementById('shown').textContent = 0;
        return;
      }
      grid.innerHTML = jobs.map(j => `
        <div class="card">
          <div class="card-top">
            <a class="title" href="${j.url}" target="_blank" rel="noopener">${j.title}</a>
            <span class="score-badge" style="color:${scoreColor(j.score)}">${j.score}/100</span>
          </div>
          <div class="card-meta"><strong>${j.company}</strong> &nbsp;·&nbsp; ${j.location}</div>
          <div class="overlap">${j.overlap} shared keywords</div>
        </div>`).join('');
      document.getElementById('shown').textContent = jobs.length;
    }

    function filter() {
      const q = document.getElementById('search').value.toLowerCase();
      const co = document.getElementById('company').value;
      const sortBy = document.getElementById('sort').value;

      let filtered = JOBS.filter(j => {
        const matchQ = !q || j.title.toLowerCase().includes(q) || j.location.toLowerCase().includes(q);
        const matchCo = !co || j.company === co;
        return matchQ && matchCo;
      });

      filtered.sort((a, b) => {
        if (sortBy === 'score') return b.score - a.score;
        if (sortBy === 'overlap') return b.overlap - a.overlap;
        return a.title.localeCompare(b.title);
      });

      render(filtered);
    }

    filter();
  </script>
</body>
</html>
