    function scoreColor(s) {
      if (s >= 95) return '#22c55e';
      if (s >= 85) return '#84cc16';
      if (s >= 75) return '#eab308';
      if (s >= 65) return '#f97316';
      return '#ef4444';
    }

    function render(jobs) {
      const grid = document.getElementById('grid');
      if (!jobs.length) {
        grid.innerHTML = '<div class="empty">No jobs match your filters.</div>';
        document.getElementById('shown').textContent = 0;
        return;
      }
      grid.innerHTML = jobs.map(j => `
        <div class="card">
          <div class="card-top">
            <a class="title" href="${j.url}" target="_blank" rel="noopener">${j.title}</a>
            <span class="score-badge" style="color:${scoreColor(j.score)}">${j.score}/100</span>
          </div>
          <div class="card-meta"><strong>${j.company}</strong> &nbsp;·&nbsp; ${j.location}</div>
          <div class="overlap">${j.overlap} shared keywords</div>
        </div>`).join('');
      document.getElementById('shown').textContent = jobs.length;
    }

    function filter() {
      const q = document.getElementById('search').value.toLowerCase();
      const co = document.getElementById('company').value;
      const sortBy = document.getElementById('sort').value;

      let filtered = JOBS.filter(j => {
        const matchQ = !q || j.title.toLowerCase().includes(q) || j.location.toLowerCase().includes(q);
        const matchCo = !co || j.company === co;
        return matchQ && matchCo;
      });

      filtered.sort((a, b) => {
        if (sortBy === 'score') return b.score - a.score;
        if (sortBy === 'overlap') return b.overlap - a.overlap;
        return a.title.localeCompare(b.title);
      });

      render(filtered);
    }

    filter();
  </script>
